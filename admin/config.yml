backend:
  name: github
  repo: https://github.com/Multiservicios-Borgil/Alquilercalatayud-web # Será actualizado por el usuario
  branch: main
  base_url: https://api.github.com

media_folder: "img"
public_folder: "img"

collections:
  - name: "config"
    label: "Panel de Control Web"
    delete: false
    editor:
      preview: false
    files:
      - name: "content"
        label: "Contenidos de la Web"
        file: "content.json"
        description: "Aquí puedes editar todos los textos y fotos de la página."
        fields:
          - {label: "Configuración General", name: "site", widget: "object", fields: [
              {label: "Nombre del Sitio", name: "name", widget: "string"},
              {label: "Teléfono", name: "phone", widget: "string"},
              {label: "Email", name: "email", widget: "string"}
            ]}
          
          - {label: "Página de Inicio", name: "home", widget: "object", fields: [
              {label: "Bloque Principal (Hero)", name: "hero", widget: "object", fields: [
                {label: "Etiqueta superior", name: "badge", widget: "string"},
                {label: "Título Principal", name: "title", widget: "string"},
                {label: "Subtítulo itálico", name: "subtitle", widget: "string"},
                {label: "Descripción breve", name: "description", widget: "text"},
                {label: "Foto Principal", name: "image", widget: "image"}
              ]},
              {label: "Nuestros Servicios", name: "services", widget: "list", fields: [
                {label: "Icono (Material Symbol)", name: "icon", widget: "string"},
                {label: "Título", name: "title", widget: "string"},
                {label: "Descripción", name: "description", widget: "text"}
              ]},
              {label: "Sección Empresas Portada", name: "company_section", widget: "object", fields: [
                 {label: "Etiqueta", name: "badge", widget: "string"},
                 {label: "Título", name: "title", widget: "string"},
                 {label: "Descripción", name: "description", widget: "text"},
                 {label: "Puntos clave", name: "bullets", widget: "list", field: {label: "Punto", name: "item", widget: "string"}}
              ]}
            ]}

          - {label: "Viviendas Detalle", name: "properties", widget: "object", fields: [
              {label: "Apartamento Sancho y Gil", name: "sancho-gil-apt", widget: "object", fields: [
                {label: "Nombre Comercial", name: "name", widget: "string"},
                {label: "Ubicación", name: "location", widget: "string"},
                {label: "Descripción Larga", name: "description_long", widget: "markdown"},
                {label: "Galería Visual (Hasta 15 fotos)", name: "gallery", widget: "list", fields: [
                  {label: "Título de la foto", name: "title", widget: "string"},
                  {label: "Imagen", name: "src", widget: "image"}
                ]}
              ]},
              {label: "Duplex Sancho y Gil", name: "sancho-gil-duplex", widget: "object", fields: [
                {label: "Nombre Comercial", name: "name", widget: "string"},
                {label: "Ubicación", name: "location", widget: "string"},
                {label: "Descripción Larga", name: "description_long", widget: "markdown"},
                {label: "Galería Visual (Hasta 15 fotos)", name: "gallery", widget: "list", fields: [
                  {label: "Título de la foto", name: "title", widget: "string"},
                  {label: "Imagen", name: "src", widget: "image"}
                ]}
              ]},
              {label: "Apartamento San Andrés", name: "san-andres", widget: "object", fields: [
                {label: "Nombre Comercial", name: "name", widget: "string"},
                {label: "Ubicación", name: "location", widget: "string"},
                {label: "Descripción Larga", name: "description_long", widget: "markdown"},
                {label: "Galería Visual (Hasta 15 fotos)", name: "gallery", widget: "list", fields: [
                  {label: "Título de la foto", name: "title", widget: "string"},
                  {label: "Imagen", name: "src", widget: "image"}
                ]}
              ]}
            ]}
